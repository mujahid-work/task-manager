<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div class="max-w-xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Create New Task</h1>
    <form id="taskForm" class="bg-white p-6 rounded shadow">
      <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Title</label>
        <input type="text" id="title" class="w-full border px-3 py-2 rounded" required>
      </div>
      <div class="mb-4">
        <label class="block text-sm font-bold mb-2">Description</label>
        <textarea id="description" class="w-full border px-3 py-2 rounded" required></textarea>
      </div>
      <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">Submit</button>
    </form>

    <div id="message" class="mt-4 text-green-600 font-medium"></div>
    <hr class="my-6">
    <h2 class="text-xl font-semibold mb-2">All Tasks</h2>
    <ul id="taskList" class="bg-white p-4 rounded shadow"></ul>
  </div>

  <script>
    async function fetchTasks() {
      const res = await fetch('/tasks/fetch-tasks');
      const data = await res.json();
      const list = document.getElementById('taskList');
      list.innerHTML = '';
      data.forEach(task => {
        const li = document.createElement('li');
        li.className = 'mb-2 border-b pb-2';
        li.innerHTML = `<strong>${task.title}</strong><p>${task.description}</p>`;
        list.appendChild(li);
      });
    }

    document.getElementById('taskForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const description = document.getElementById('description').value;

      const response = await fetch('/tasks/create-task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
      });

      const result = await response.json();
      document.getElementById('message').textContent = 'Task created successfully!';
      fetchTasks();
      this.reset();
    });

    window.onload = fetchTasks;
  </script>
</body>
</html>
